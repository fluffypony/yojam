name: Yojam
options:
  bundleIdPrefix: com.yojam
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  Yojam:
    type: application
    platform: macOS
    sources:
      - path: Sources/Yojam
        excludes:
          - Resources/Info.plist
          - Resources/Yojam.entitlements
          - Resources/menubar.svg
    dependencies:
      - package: Sparkle
    info:
      path: Sources/Yojam/Resources/Info.plist
      properties:
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUFeedURL: https://yojam.org/appcast.xml
        SUPublicEDKey: PLACEHOLDER_ED25519_PUBLIC_KEY
        SUEnableAutomaticChecks: true
        CFBundleURLTypes:
          - CFBundleURLName: Web URL
            CFBundleURLSchemes:
              - http
              - https
          - CFBundleURLName: Mail URL
            CFBundleURLSchemes:
              - mailto
        NSAppleEventsUsageDescription: "Yojam needs to send Apple Events to open private browsing windows in Safari and Orion."
        CFBundleDocumentTypes:
          - CFBundleTypeName: HTML Document
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.html
            LSHandlerRank: Default
          - CFBundleTypeName: XHTML Document
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.xhtml
            LSHandlerRank: Default
    entitlements:
      path: Sources/Yojam/Resources/Yojam.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
        com.apple.security.automation.apple-events: true
    settings:
      base:
        INFOPLIST_FILE: Sources/Yojam/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Yojam/Resources/Yojam.entitlements
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.yojam.app
        PRODUCT_NAME: Yojam
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

  YojamTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/YojamTests
    dependencies:
      - target: Yojam
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Yojam.app/Contents/MacOS/Yojam"
        BUNDLE_LOADER: "$(TEST_HOST)"
